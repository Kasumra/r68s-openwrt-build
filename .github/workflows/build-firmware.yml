name: Build R68S OpenWrt Firmware

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build R68S (RK3568)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout LEDE
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          path: lede

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential gcc-multilib g++-multilib \
            file wget curl git unzip bzip2 xz-utils zstd \
            python3 python3-setuptools \
            libncurses-dev \
            zlib1g-dev gawk gettext \
            libssl-dev xsltproc rsync \
            libelf-dev dwarves \
            flex bison bc time \
            autoconf automake libtool \
            cpio kmod patch pkg-config swig \
            rename meson cmake ninja-build

      - name: Update & Install Feeds
        working-directory: lede
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate Config & Build
        working-directory: lede
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_fastrhino_r68s=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_TARGET_ALL_PROFILES=n
          CONFIG_TARGET_PER_DEVICE_ROOTFS=n

          CONFIG_DEVEL=y
          CONFIG_BUILD_LOG=y

          # Use mbedtls as SSL backend (avoids openssl variant build failures)
          CONFIG_PACKAGE_libustream-mbedtls=y
          CONFIG_PACKAGE_libmbedtls=y
          CONFIG_PACKAGE_px5g-mbedtls=y

          # System
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_usbutils=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_irqbalance=y
          CONFIG_PACKAGE_ethtool=y

          # LuCI
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y

          # R68S Network Settings
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_iperf3=y

          # PassWall
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y

          # VPN
          CONFIG_PACKAGE_luci-app-zerotier=y
          CONFIG_PACKAGE_luci-i18n-zerotier-zh-cn=y
          CONFIG_PACKAGE_luci-app-wireguard=y
          CONFIG_PACKAGE_wireguard-tools=y
          CONFIG_PACKAGE_kmod-wireguard=y

          # Network/Stability
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y
          CONFIG_PACKAGE_sqm-scripts=y
          CONFIG_PACKAGE_luci-app-sqm=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-statistics=y
          CONFIG_PACKAGE_luci-i18n-statistics-zh-cn=y

          # DNS
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_luci-app-turboacc=y

          # System tools
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-commands=y
          CONFIG_PACKAGE_luci-app-vlmcsd=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_coreutils=y

          # IPv6
          CONFIG_PACKAGE_ipv6helper=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_kmod-ip6tables=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y

          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          EOF

          make defconfig

          echo "=== Config check ==="
          echo "Total CONFIG_PACKAGE entries: $(grep -c '^CONFIG_PACKAGE' .config)"
          echo "R68S device: $(grep 'fastrhino_r68s' .config | grep -c '=y')"
          echo "PassWall: $(grep 'PACKAGE_luci-app-passwall=' .config)"
          echo "mbedtls: $(grep 'PACKAGE_libmbedtls=' .config)"
          echo "ustream: $(grep 'PACKAGE_libustream' .config | grep '=y')"

          echo ""
          echo "=== Start download + compile ==="
          make download -j$(nproc) V=s
          make -j$(nproc) V=s 2>&1 | tee build.log

      - name: Show Build Result
        if: always()
        working-directory: lede
        run: |
          echo "=== Build products ==="
          find bin/targets/rockchip -type f
          echo "=== Build log tail ==="
          tail -30 build.log 2>/dev/null || true

      - name: Upload Firmware
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r68s-firmware
          path: lede/bin/targets/rockchip/armv8/
          retention-days: 30

      - name: Upload Config
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r68s-config
          path: |
            lede/.config
            lede/build.log
          retention-days: 30
